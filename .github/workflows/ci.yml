name: Product Service CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Docker Image
        run: docker build -t product-service .

      - name: Run Container (test)
        run: docker run -d -p 3000:3000 product-service

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag Docker Image
        run: docker tag product-service ${{ secrets.DOCKER_USERNAME }}/product-service:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/product-service:latest
